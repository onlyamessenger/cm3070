name: fortify
description: Fortify Flutter application.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../../packages/core
  provider: ^6.0.5
  get_it: ^7.6.0
  go_router: ^7.0.0
  appwrite: ^13.0.0
  sentry_flutter: ^9.14.0
  google_fonts: ^6.2.1
  data_table_2: ^2.6.0
  flutter_dotenv: ^6.0.0
  flutter_web_plugins:
    sdk: flutter
  url_launcher: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  build_runner: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - .env
